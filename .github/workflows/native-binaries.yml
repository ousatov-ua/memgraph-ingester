name: Native Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: memgraph-ingester-linux-amd64
            id: linux-amd64
            profile: native-linux
            runner: ubuntu-latest
            artifact_path: target/memgraph-ingester-linux-amd64
          - binary: memgraph-ingester-macos-arm64
            id: macos-arm64
            profile: native-macos
            runner: macos-15
            artifact_path: target/memgraph-ingester-macos-arm64
          - binary: memgraph-ingester-windows-amd64
            id: windows-amd64
            profile: native-windows
            runner: windows-latest
            artifact_path: target/memgraph-ingester-windows-amd64.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Linux native-image toolchain
        if: matrix.id == 'linux-amd64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'

      - name: Build Unix binary
        if: matrix.id == 'linux-amd64' || matrix.id == 'macos-arm64'
        shell: bash
        run: |
          mvn --batch-mode --no-transfer-progress -P${{ matrix.profile }} -DskipTests package
          test -x '${{ matrix.artifact_path }}'
          '${{ matrix.artifact_path }}' --help
          '${{ matrix.artifact_path }}' --check-js-runtime --js-runtime-cache '${{ runner.temp }}/memgraph-ingester-js-cache'
          '${{ matrix.artifact_path }}' --check-js-runtime --js-runtime-mode offline --js-runtime-cache '${{ runner.temp }}/memgraph-ingester-js-cache'

      - name: Build Windows binary
        if: matrix.id == 'windows-amd64'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo Visual Studio installation with VC tools not found.
            exit /b 1
          )
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=amd64
          mvn --batch-mode --no-transfer-progress -Pnative-windows -DskipTests package
          if not exist target\memgraph-ingester-windows-amd64.exe (
            echo target\memgraph-ingester-windows-amd64.exe was not produced.
            exit /b 1
          )
          target\memgraph-ingester-windows-amd64.exe --help
          target\memgraph-ingester-windows-amd64.exe --check-js-runtime --js-runtime-cache "%RUNNER_TEMP%\memgraph-ingester-js-cache"
          target\memgraph-ingester-windows-amd64.exe --check-js-runtime --js-runtime-mode offline --js-runtime-cache "%RUNNER_TEMP%\memgraph-ingester-js-cache"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
