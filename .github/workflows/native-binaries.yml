name: Native Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: memgraph-ingester-linux-amd64
            id: linux-amd64
            profile: native-linux
            runner: ubuntu-latest
            artifact_path: target/memgraph-ingester-linux-amd64
          - binary: memgraph-ingester-macos-arm64
            id: macos-arm64
            profile: native-macos
            runner: macos-15
            artifact_path: target/memgraph-ingester-macos-arm64
          - binary: memgraph-ingester-windows-amd64
            id: windows-amd64
            profile: native-windows
            runner: windows-latest
            artifact_path: target/memgraph-ingester-windows-amd64.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Linux native-image toolchain
        if: matrix.id == 'linux-amd64'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zlib1g-dev

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'

      - name: Build Unix binary
        if: matrix.id == 'linux-amd64' || matrix.id == 'macos-arm64'
        shell: bash
        run: |
          mvn --batch-mode --no-transfer-progress -P${{ matrix.profile }} -DskipTests package
          test -x '${{ matrix.artifact_path }}'
          '${{ matrix.artifact_path }}' --help
          '${{ matrix.artifact_path }}' --check-js-runtime --js-runtime-cache '${{ runner.temp }}/memgraph-ingester-js-cache'
          '${{ matrix.artifact_path }}' --check-js-runtime --js-runtime-mode offline --js-runtime-cache '${{ runner.temp }}/memgraph-ingester-js-cache'

      - name: Build Windows binary
        if: matrix.id == 'windows-amd64'
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo Visual Studio installation with VC tools not found.
            exit /b 1
          )
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=amd64
          mvn --batch-mode --no-transfer-progress -Pnative-windows -DskipTests package
          if not exist target\memgraph-ingester-windows-amd64.exe (
            echo target\memgraph-ingester-windows-amd64.exe was not produced.
            exit /b 1
          )
          target\memgraph-ingester-windows-amd64.exe --help
          target\memgraph-ingester-windows-amd64.exe --check-js-runtime --js-runtime-cache "%RUNNER_TEMP%\memgraph-ingester-js-cache"
          target\memgraph-ingester-windows-amd64.exe --check-js-runtime --js-runtime-mode offline --js-runtime-cache "%RUNNER_TEMP%\memgraph-ingester-js-cache"

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14

  shaded-jar:
    name: Build shaded jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build shaded jar
        run: |
          mvn --batch-mode --no-transfer-progress clean -Pshade -DskipTests package
          test -f target/memgraph-ingester.jar

      - name: Upload shaded jar
        uses: actions/upload-artifact@v6
        with:
          name: memgraph-ingester.jar
          path: target/memgraph-ingester.jar
          if-no-files-found: error
          retention-days: 14

  homebrew-release:
    name: Release assets and Homebrew tap
    needs:
      - build
      - shaded-jar
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v6
        with:
          name: memgraph-ingester-linux-amd64
          path: release-input/linux-amd64

      - name: Download macOS binary
        uses: actions/download-artifact@v6
        with:
          name: memgraph-ingester-macos-arm64
          path: release-input/darwin-arm64

      - name: Download Windows binary
        uses: actions/download-artifact@v6
        with:
          name: memgraph-ingester-windows-amd64
          path: release-input/windows-amd64

      - name: Download shaded jar
        uses: actions/download-artifact@v6
        with:
          name: memgraph-ingester.jar
          path: release-input/shaded-jar

      - name: Package release assets
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          mkdir -p dist/linux-amd64 dist/darwin-arm64 release-assets
          install -m 0755 release-input/linux-amd64/memgraph-ingester-linux-amd64 dist/linux-amd64/memgraph-ingester
          install -m 0755 release-input/darwin-arm64/memgraph-ingester-macos-arm64 dist/darwin-arm64/memgraph-ingester

          tar -C dist/linux-amd64 -czf "release-assets/memgraph-ingester-${VERSION}-linux-amd64.tar.gz" memgraph-ingester
          tar -C dist/darwin-arm64 -czf "release-assets/memgraph-ingester-${VERSION}-darwin-arm64.tar.gz" memgraph-ingester
          zip -j "release-assets/memgraph-ingester-${VERSION}-windows-amd64.zip" release-input/windows-amd64/memgraph-ingester-windows-amd64.exe
          cp release-input/shaded-jar/memgraph-ingester.jar "release-assets/memgraph-ingester-${VERSION}.jar"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.jar
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Publish formula to Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: ousatov-ua
          homebrew_tap: homebrew-memgraph-ingester
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit_owner: homebrew-releaser
          commit_email: homebrew-releaser@example.com
          install: 'bin.install "memgraph-ingester"'
          test: 'system "#{bin}/memgraph-ingester", "--version"'
          target_darwin_arm64: true
          target_linux_amd64: true
