name: Shaded Jar

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build shaded jar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build shaded jar
        run: |
          mvn clean -Pshade package
          test -f target/memgraph-ingester.jar

      - name: Upload shaded jar
        uses: actions/upload-artifact@v6
        with:
          name: memgraph-ingester.jar
          path: target/memgraph-ingester.jar
          if-no-files-found: error
          retention-days: 14
